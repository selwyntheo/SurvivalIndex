#
# DigitalOcean App Platform Specification - Frontend Only
# Backend is deployed separately from SurvivalIndex-api repo
# Deploy with: doctl apps update 6affe60f-7a82-4713-9f9a-9d5936b3762c --spec .do/app.yaml
#

name: survivalindex-frontend
region: nyc

# Frontend Static Site
static_sites:
  - name: web
    github:
      repo: selwyntheo/survivalindex
      branch: main
      deploy_on_push: true

    source_dir: /apps/frontend

    build_command: npm install && npm run build
    output_dir: dist

    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: "https://survivalindex-api-tthti.ondigitalocean.app/api"

    routes:
      - path: /

    catchall_document: index.html

# Custom domains
domains:
  - domain: survivalindex.org
    type: PRIMARY
    zone: survivalindex.org
  - domain: www.survivalindex.org
    type: ALIAS
    zone: survivalindex.org
