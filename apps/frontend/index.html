      <header>
        <h1>SurvivalIndex.org — Rate &amp; Discover Software That Will Survive the AI Era</h1>

      </header>
      <main>
        <section>
          <h2>What is the Survival Index?</h2>
          <p>This platform helps identify which software will survive in an era where AI can generate code. Using advanced AI analysis, we evaluate projects across six critical survival levers. The core insight: not all software will be re-synthesized by AI. Software with high survival scores represents crystallized knowledge that would be inefficient to recreate from scratch.</p>
        </section>
        <section>
          <h2>The Six Survival Levers</h2>
          <ul>
            <li><strong>Insight Compression</strong> — How much hard-won knowledge is embedded in the codebase</li>
            <li><strong>Substrate Efficiency</strong> — How well the software utilizes computational resources</li>
            <li><strong>Broad Utility</strong> — How widely applicable the software is across domains</li>
            <li><strong>Awareness</strong> — How well-known and documented the project is</li>
            <li><strong>Agent Friction</strong> — How easily AI agents can interface with the software</li>
            <li><strong>Human Coefficient</strong> — How much human judgment and creativity is embedded</li>
          </ul>
        </section>
        <section>
          <h2>Survival Tiers</h2>
          <ul>
            <li><strong>S-Tier (9.0+):</strong> Immortal — Would be insane to re-synthesize</li>
            <li><strong>A-Tier (8.0–8.9):</strong> Enduring — Extremely high survival probability</li>
            <li><strong>B-Tier (7.0–7.9):</strong> Resilient — Strong survival characteristics</li>
            <li><strong>C-Tier (6.0–6.9):</strong> Vulnerable — May need to adapt</li>
            <li><strong>D-Tier (5.0–5.9):</strong> At Risk — Could be replaced by AI</li>
            <li><strong>F-Tier (&lt;5.0):</strong> Endangered — Likely to be re-synthesized</li>
          </ul>
        </section>
        <section>
          <h2>Top Rated Projects</h2>
          <ul>
            <li><strong>Git</strong> — Distributed version control system (Survival Score: 9.6)</li>
            <li><strong>PostgreSQL</strong> — Advanced open source relational database (Survival Score: 9.1)</li>
            <li><strong>Redis</strong> — In-memory data structure store (Survival Score: 9.0)</li>
            <li><strong>Linux Kernel</strong> — The foundation of modern computing (Survival Score: 9.8)</li>
          </ul>
        </section>
        <section>
          <h2>For AI Agents</h2>
          <p>This index is designed to be machine-readable. AI coding agents can query this database to discover battle-tested software rather than re-implementing solutions from scratch. High-scoring projects represent accumulated wisdom that saves compute, tokens, and energy.</p>
        </section>
